<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="우인경 — SC 제조기술팀 디지털 명함" />
  <title>우인경 | Digital Business Card</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>우</text></svg>" />
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="page">
    <article class="card" id="card">
      <header class="card-header">
        <div class="avatar" aria-hidden="true">
          <span class="avatar-initial">우</span>
        </div>
        <p class="nickname">
          <span class="nickname-badge">@</span>
          잡기에능한우여사
        </p>
      </header>

      <section class="card-body">
        <h1 class="name">우인경</h1>
        <p class="name-en">Inkyeong Woo</p>

        <div class="contacts">
          <a class="contact" href="tel:03180472043" aria-label="전화 걸기">
            <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            031-8047-2043
          </a>
          <a class="contact" href="mailto:ikwoo@amorepacific.com" aria-label="이메일 보내기">
            <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            ikwoo@amorepacific.com
          </a>
        </div>

        <div class="divider"></div>

        <div class="role">
          <p class="unit">생산 Unit</p>
          <p class="team">SC 제조기술팀</p>
        </div>

        <p class="tagline">정밀함으로 만드는 가치, 현장에서 증명합니다.</p>
      </section>

      <section class="card-actions">
        <button type="button" class="btn btn-primary" id="copyBtn" aria-label="연락처 복사">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyBtnText">명함 정보 복사</span>
        </button>
        <button type="button" class="btn btn-ghost" id="shareBtn" aria-label="공유하기">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          공유하기
        </button>
      </section>

      <section class="qr-section" aria-label="상세 정보 QR 코드">
        <div class="qr-wrap">
          <div id="qrCode" class="qr-code" role="img" aria-label="경력 및 전문 분야 상세 페이지 QR 코드"></div>
        </div>
        <p class="qr-label">QR 스캔 · 경력 &amp; 전문 분야</p>
        <a class="qr-link" href="detail.html">상세 페이지 바로 보기</a>
      </section>
    </article>

    <p class="hint">QR을 스캔하면 팀 경력·전문 분야를 볼 수 있어요</p>
    <p class="font-credit">이 제작물은 아모레퍼시픽의 아리따글꼴을 사용하여 디자인 되었습니다.</p>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="qrcode.min.js?v=2"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
